<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator Standar — RKD Suite</title>
<link rel="stylesheet" href="dashboard.css">
<style>
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; margin: 0;
  }
  .calc-container {
    background: rgba(7, 2, 14, 0.9);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(168, 85, 247, 0.4);
    border-radius: 24px;
    padding: 30px;
    width: 340px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 30px rgba(168,85,247,0.2);
    position: relative; z-index: 10;
  }
  .display {
    background: rgba(168, 85, 247, 0.05);
    border: 1px solid rgba(168, 85, 247, 0.3);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
    text-align: right;
    box-shadow: inset 0 2px 15px rgba(0,0,0,0.5);
  }
  .prev-calc { font-size: 14px; color: #a78bfa; min-height: 20px; font-family: 'Orbitron', sans-serif; }
  .current-calc { font-size: 36px; font-weight: 700; color: #f3e8ff; margin-top: 8px; font-family: 'Orbitron', sans-serif; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  
  .keypad {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  }
  .btn-calc {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 18px 0;
    font-size: 20px; font-weight: 600; color: #e9d5ff;
    cursor: pointer; transition: all 0.2s;
    font-family: 'Outfit', sans-serif;
  }
  .btn-calc:hover { background: rgba(168, 85, 247, 0.2); border-color: rgba(168, 85, 247, 0.5); transform: translateY(-2px); }
  .btn-calc:active { transform: translateY(2px); }
  
  .btn-op { background: rgba(168, 85, 247, 0.15); color: #c084fc; border-color: rgba(168, 85, 247, 0.4); }
  .btn-op:hover { background: rgba(168, 85, 247, 0.3); }
  
  .btn-clear { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border-color: rgba(239, 68, 68, 0.4); }
  .btn-clear:hover { background: rgba(239, 68, 68, 0.3); border-color: rgba(239, 68, 68, 0.6); }
  
  .btn-equal { background: linear-gradient(135deg, #a855f7, #7c3aed); color: #fff; border: none; box-shadow: 0 4px 15px rgba(168,85,247,0.4); }
  .btn-equal:hover { filter: brightness(1.2); }
  
  .back-link {
    position: absolute; top: 20px; left: 20px; z-index: 100;
    color: #c084fc; text-decoration: none; font-size: 14px; font-weight: 700;
    font-family: 'Orbitron', sans-serif; display: flex; align-items: center; gap: 8px;
    background: rgba(7,2,14,0.8); padding: 8px 16px; border-radius: 10px;
    border: 1px solid rgba(168,85,247,0.3); transition: all 0.3s;
  }
  .back-link:hover { background: var(--p); color: #fff; transform: scale(1.05); }
</style>
</head>
<body>

<div class="cyber-bg"></div>
<div class="glow-orb-1"></div><div class="glow-orb-2"></div>
<div class="grid-overlay"></div><div class="scanline"></div>

<a href="index.html" class="back-link">◀ KEMBALI</a>

<div class="calc-container">
  <div class="display">
    <div class="prev-calc" id="prev-op"></div>
    <div class="current-calc" id="current-op">0</div>
  </div>
  
  <div class="keypad">
    <button class="btn-calc btn-clear" onclick="clearAll()">AC</button>
    <button class="btn-calc btn-clear" onclick="del()">DEL</button>
    <button class="btn-calc btn-op" onclick="appendOp('%')">%</button>
    <button class="btn-calc btn-op" onclick="appendOp('/')">÷</button>
    
    <button class="btn-calc" onclick="appendNum('7')">7</button>
    <button class="btn-calc" onclick="appendNum('8')">8</button>
    <button class="btn-calc" onclick="appendNum('9')">9</button>
    <button class="btn-calc btn-op" onclick="appendOp('*')">×</button>
    
    <button class="btn-calc" onclick="appendNum('4')">4</button>
    <button class="btn-calc" onclick="appendNum('5')">5</button>
    <button class="btn-calc" onclick="appendNum('6')">6</button>
    <button class="btn-calc btn-op" onclick="appendOp('-')">−</button>
    
    <button class="btn-calc" onclick="appendNum('1')">1</button>
    <button class="btn-calc" onclick="appendNum('2')">2</button>
    <button class="btn-calc" onclick="appendNum('3')">3</button>
    <button class="btn-calc btn-op" onclick="appendOp('+')">+</button>
    
    <button class="btn-calc" onclick="appendNum('00')">00</button>
    <button class="btn-calc" onclick="appendNum('0')">0</button>
    <button class="btn-calc" onclick="appendNum('.')">.</button>
    <button class="btn-calc btn-equal" onclick="calculate()">=</button>
  </div>
</div>

<script>
  let current = '0';
  let prev = '';
  let op = undefined;
  
  const currEl = document.getElementById('current-op');
  const prevEl = document.getElementById('prev-op');

  function updateDisplay() {
    currEl.innerText = current;
    if (op != null) {
      prevEl.innerText = `${prev} ${op === '*' ? '×' : op === '/' ? '÷' : op}`;
    } else {
      prevEl.innerText = '';
    }
  }

  function appendNum(num) {
    if (num === '.' && current.includes('.')) return;
    if (current === '0' && num !== '.') current = num;
    else current = current.toString() + num.toString();
    updateDisplay();
  }

  function appendOp(operator) {
    if (current === '' && operator !== '-') return;
    if (current === '' && operator === '-') { current = '-'; updateDisplay(); return; }
    if (prev !== '') calculate();
    op = operator;
    prev = current;
    current = '';
    updateDisplay();
  }

  function calculate() {
    let result;
    const p = parseFloat(prev);
    const c = parseFloat(current);
    if (isNaN(p) || isNaN(c)) return;
    
    switch (op) {
      case '+': result = p + c; break;
      case '-': result = p - c; break;
      case '*': result = p * c; break;
      case '/': result = p / c; break;
      case '%': result = (p / 100) * c; break;
      default: return;
    }
    
    // Fix floating point issues
    current = Math.round(result * 100000000) / 100000000;
    op = undefined;
    prev = '';
    updateDisplay();
  }

  function clearAll() {
    current = '0'; prev = ''; op = undefined;
    updateDisplay();
  }

  function del() {
    current = current.toString().slice(0, -1);
    if (current === '') current = '0';
    updateDisplay();
  }

  // Handle ESC key to go back
  document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape') {
      window.location.href = 'index.html';
    }
  });
</script>

<script src="theme-manager.js"></script>
</body>
</html>
