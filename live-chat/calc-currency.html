<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator Mata Uang — RKD Suite</title>
<link rel="stylesheet" href="dashboard.css">
<style>
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; margin: 0;
  }
  .converter-container {
    background: rgba(7, 2, 14, 0.9);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(14, 165, 233, 0.4);
    border-radius: 24px;
    padding: 35px 30px;
    width: 440px; max-width: 95%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 30px rgba(14,165,233,0.2);
    position: relative; z-index: 10;
  }
  .title {
    font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 800;
    text-align: center; color: #7dd3fc; margin-bottom: 24px;
    text-transform: uppercase; letter-spacing: 2px;
  }
  
  .input-group {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 16px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
    transition: all 0.3s;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
  }
  .input-group:focus-within { border-color: #0ea5e9; background: rgba(14,165,233,0.05); box-shadow: inset 0 2px 15px rgba(14,165,233,0.1), 0 0 15px rgba(14,165,233,0.2); }
  
  select {
    background: transparent; color: #38bdf8; border: none; font-size: 18px; font-weight: 700;
    outline: none; cursor: pointer; font-family: 'Outfit', sans-serif;
    width: 160px; max-width: 160px;
    text-overflow: ellipsis;
  }
  select option { background: #07020e; color: #fff; font-family: 'Outfit', sans-serif; font-size: 16px; padding: 4px; }
  select optgroup { font-family: 'Orbitron', sans-serif; color: #0ea5e9; font-weight: 700; font-size: 12px; margin-top: 8px; }
  
  input[type="number"], input[type="text"] {
    flex: 1; background: transparent; border: none;
    color: #fff; font-size: 24px; font-weight: 700; text-align: right;
    outline: none; font-family: 'Outfit', sans-serif;
    width: 100%; min-width: 0;
  }
  
  .copy-btn {
    background: rgba(14,165,233,0.1); border: 1px solid rgba(14,165,233,0.3);
    border-radius: 10px; color: #7dd3fc; cursor: pointer; padding: 8px 12px;
    font-size: 16px; transition: all 0.3s; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .copy-btn:hover { background: #0ea5e9; color: #fff; transform: scale(1.1); box-shadow: 0 0 10px #0ea5e9; }

  .swap-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(14,165,233,0.15); border: 1px solid rgba(14,165,233,0.3);
    color: #7dd3fc; font-size: 20px; cursor: pointer;
    margin: 0 auto 16px; display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
  }
  .swap-btn:hover { background: #0ea5e9; color: #fff; transform: rotate(180deg); }
  
  .rate-info {
    text-align: center; font-size: 12px; color: #94a3b8;
    margin-top: 20px; line-height: 1.6;
  }
  
  .back-link {
    position: absolute; top: 20px; left: 20px; z-index: 100;
    color: #7dd3fc; text-decoration: none; font-size: 14px; font-weight: 700;
    font-family: 'Orbitron', sans-serif; display: flex; align-items: center; gap: 8px;
    background: rgba(7,2,14,0.8); padding: 8px 16px; border-radius: 10px;
    border: 1px solid rgba(14,165,233,0.3); transition: all 0.3s;
  }
  .back-link:hover { background: #0ea5e9; color: #fff; transform: scale(1.05); }
  
  .loading-overlay {
    position: absolute; inset: 0; background: rgba(7,2,14,0.8); border-radius: 24px;
    display: flex; align-items: center; justify-content: center; z-index: 20;
    font-family: 'Orbitron', sans-serif; color: #38bdf8; font-size: 14px; font-weight: 700;
    backdrop-filter: blur(5px);
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="cyber-bg"></div>
<div class="glow-orb-2"></div><div class="glow-orb-3"></div>
<div class="grid-overlay"></div><div class="scanline"></div>

<a href="index.html" class="back-link">◀ KEMBALI</a>

<div class="converter-container">
  <div class="loading-overlay" id="loading">CONNECTING TO API...</div>
  
  <div class="title">Currency Converter</div>
  
  <div class="input-group">
    <select id="currency-from" onchange="convert()"></select>
    <input type="number" id="amount-from" value="1" min="0" oninput="convert()" placeholder="0">
  </div>
  
  <button class="swap-btn" onclick="swapCurrencies()">⇅</button>
  
  <div class="input-group">
    <select id="currency-to" onchange="convert()"></select>
    <input type="text" id="amount-to" readonly placeholder="0">
    <button class="copy-btn" onclick="copyResult()" title="Copy Result">📋</button>
  </div>
  
  <div class="rate-info">
    <div id="rate-text">1 USD = ... IDR</div>
    <div id="update-text" style="font-size: 10px; opacity: 0.6; margin-top: 6px;">Live Exchange Rates via API</div>
  </div>
</div>

<script>
  const currFrom = document.getElementById('currency-from');
  const currTo = document.getElementById('currency-to');
  const amtFrom = document.getElementById('amount-from');
  const amtTo = document.getElementById('amount-to');
  const rateText = document.getElementById('rate-text');
  const loading = document.getElementById('loading');
  
  let rates = {};

  // Top currencies to show first
  const topCurrencies = ['IDR', 'USD', 'EUR', 'MYR', 'SGD', 'JPY', 'CNY', 'GBP', 'AUD', 'KRW', 'THB'];
  
  const flags = {
    'IDR': '🇮🇩', 'USD': '🇺🇸', 'EUR': '🇪🇺', 'MYR': '🇲🇾', 'SGD': '🇸🇬', 
    'JPY': '🇯🇵', 'CNY': '🇨🇳', 'GBP': '🇬🇧', 'AUD': '🇦🇺', 'KRW': '🇰🇷', 'THB': '🇹🇭'
  };

  async function fetchRates() {
    try {
      const res = await fetch('https://open.er-api.com/v6/latest/USD');
      const data = await res.json();
      rates = data.rates;
      
      if(data.time_last_update_utc) {
        document.getElementById('update-text').innerText = 'Data Date: ' + data.time_last_update_utc.replace('00:00:00', '').trim();
      }

      populateSelects(rates);
      loading.classList.add('hidden');
      convert();
    } catch (e) {
      loading.innerText = 'API CONNECTION FAILED';
      console.error(e);
    }
  }

  function populateSelects(data) {
    let optionsHTML = '<optgroup label="🔥 Top Currencies">';
    
    let allCurr = Object.keys(data).sort();
    
    // Add top currencies first
    topCurrencies.forEach(currency => {
      if(rates[currency]) {
        const flag = flags[currency] || '💸';
        optionsHTML += `<option value="${currency}">${flag} ${currency} - ${getCurrencyName(currency)}</option>`;
      }
    });

    optionsHTML += '</optgroup><optgroup label="🌍 All Currencies">';
    
    // Add the rest
    allCurr.forEach(currency => {
      if(!topCurrencies.includes(currency) && rates[currency]) {
        optionsHTML += `<option value="${currency}">🏳️ ${currency}</option>`;
      }
    });
    
    optionsHTML += '</optgroup>';

    currFrom.innerHTML = optionsHTML;
    currTo.innerHTML = optionsHTML;
    
    // Default select USD -> IDR
    currFrom.value = 'USD';
    currTo.value = 'IDR';
  }

  // Simple helper for top currency names to make it clearer
  function getCurrencyName(code) {
    const names = {
      'IDR': 'Rupiah', 'USD': 'US Dollar', 'EUR': 'Euro',
      'MYR': 'Ringgit', 'SGD': 'Sing Dollar', 'JPY': 'Yen',
      'CNY': 'Yuan', 'GBP': 'Poundsterling', 'AUD': 'Aus Dollar',
      'KRW': 'Won', 'THB': 'Baht'
    };
    return names[code] || code;
  }

  function convert() {
    const from = currFrom.value;
    const to = currTo.value;
    const amount = parseFloat(amtFrom.value);
    
    if (isNaN(amount)) {
      amtTo.value = '';
      return;
    }
    
    // Convert to USD first (base), then to target
    const amountInUSD = amount / rates[from];
    const result = amountInUSD * rates[to];
    
    // Format output
    amtTo.value = result.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
    
    // Update rate info
    const singleRate = (1 / rates[from]) * rates[to];
    rateText.innerText = `1 ${from} = ${singleRate.toLocaleString('en-US', {maximumFractionDigits: 4})} ${to}`;
  }

  function copyResult() {
    if(!amtTo.value) return;
    navigator.clipboard.writeText(amtTo.value);
    const btn = document.querySelector('.copy-btn');
    btn.innerHTML = '✔️';
    setTimeout(() => btn.innerHTML = '📋', 2000);
  }

  function swapCurrencies() {
    const temp = currFrom.value;
    currFrom.value = currTo.value;
    currTo.value = temp;
    convert();
  }

  // Init
  fetchRates();

  // Handle ESC key to go back
  document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape') {
      window.location.href = 'index.html';
    }
  });
</script>

<script src="theme-manager.js"></script>
</body>
</html>
